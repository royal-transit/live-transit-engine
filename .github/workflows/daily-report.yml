name: Daily Oracle Report

on:
  schedule:
    - cron: '0 7 * * *'   # 7 AM UK time
  workflow_dispatch:

jobs:
  run-oracle:
    runs-on: ubuntu-latest

    steps:

      - name: Generate Oracle Message from GPT
        id: oracle
        run: |
          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -d '{
              "model": "gpt-5.3",
              "messages": [
                {
                  "role": "system",
                  "content": "You are Royel Oracle Engine. Give a daily prophetic astrology forecast for Royel using deterministic tone, include key events with exact times, and finish in Bengali lokkotha style."
                },
                {
                  "role": "user",
                  "content": "Generate today's full day prediction for Royel. Include: morning, afternoon, evening, night events with exact times (UK & BD). Keep it structured and prophetic."
                }
              ]
            }')

          MESSAGE=$(echo $RESPONSE | jq -r '.choices[0].message.content')

          echo "MESSAGE<<EOF" >> $GITHUB_ENV
          echo "$MESSAGE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send WhatsApp Message
        run: |
          curl -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Messages.json" \
          --data-urlencode "To=${{ secrets.TO_WHATSAPP }}" \
          --data-urlencode "From=whatsapp:+14155238886" \
          --data-urlencode "Body=$MESSAGE" \
          -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}"
