name: Daily WhatsApp Reminder

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  daily-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Check core APIs
        run: |
          transit="FAIL"
          dasha="FAIL"
          oracle="FAIL"

          curl -s "https://live-transit-engine.vercel.app/api/transit?lat=51.1465&lon=0.8756" > transit.json
          if grep -q '"sun"' transit.json && grep -q '"moon"' transit.json; then
            transit="OK"
          fi

          curl -s "https://live-transit-engine.vercel.app/api/dasha?moon_longitude=335.46" > dasha.json
          if grep -q '"nakshatra"' dasha.json && grep -q '"current_mahadasha"' dasha.json; then
            dasha="OK"
          fi

          curl -s "https://live-transit-engine.vercel.app/api/oracle?lat=51.1465&lon=0.8756" > oracle.json
          if grep -q '"evidence_packet"' oracle.json; then
            oracle="OK"
          fi

          status="OK"
          if [ "$transit" != "OK" ] || [ "$dasha" != "OK" ] || [ "$oracle" != "OK" ]; then
            status="ATTENTION NEEDED"
          fi

          echo "STATUS=$status" >> $GITHUB_ENV
          echo "TRANSIT=$transit" >> $GITHUB_ENV
          echo "DASHA=$dasha" >> $GITHUB_ENV
          echo "ORACLE=$oracle" >> $GITHUB_ENV

      - name: Send WhatsApp Daily Reminder
        run: |
          MESSAGE="📊 Daily System Reminder

Status: $STATUS
Transit: $TRANSIT
Dasha: $DASHA
Oracle: $ORACLE"

          curl -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Messages.json" \
          --data-urlencode "To=${{ secrets.TO_WHATSAPP }}" \
          --data-urlencode "From=whatsapp:+14155238886" \
          --data-urlencode "Body=$MESSAGE" \
          -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}"
