name: Daily Oracle Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

jobs:
  run-oracle:
    runs-on: ubuntu-latest

    steps:
      - name: Call OpenAI (fixed)
        run: |
          cat <<EOF > request.json
          {
            "model": "gpt-4o",
            "messages": [
              {
                "role": "system",
                "content": "You are Royel Oracle Engine. Give short daily prophecy."
              },
              {
                "role": "user",
                "content": "Give today's prediction in Bengali lokkotha style with times."
              }
            ]
          }
          EOF

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @request.json)

          echo "$RESPONSE" > response.json
          cat response.json

      - name: Extract message
        run: |
          MESSAGE=$(jq -r '.choices[0].message.content' response.json)
          echo "MESSAGE<<EOF" >> $GITHUB_ENV
          echo "$MESSAGE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send WhatsApp
        run: |
          curl -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Messages.json" \
          --data-urlencode "To=${{ secrets.TO_WHATSAPP }}" \
          --data-urlencode "From=whatsapp:+14155238886" \
          --data-urlencode "Body=$MESSAGE" \
          -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}"
