name: Daily Smart WhatsApp Report

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check APIs and build summary
        id: summary
        run: |
          transit="FAIL"
          kp="FAIL"
          dasha="FAIL"
          oracle="FAIL"

          curl -s "https://live-transit-engine.vercel.app/api/transit?lat=51.1465&lon=0.8756" > transit.json
          grep -q '"sun"' transit.json && grep -q '"moon"' transit.json && transit="OK"

          curl -s "https://live-transit-engine.vercel.app/api/kp?lat=51.1465&lon=0.8756" > kp.json
          grep -q '"kp_cusps"' kp.json && kp="OK"

          curl -s "https://live-transit-engine.vercel.app/api/dasha?moon_longitude=335.46" > dasha.json
          grep -q '"nakshatra"' dasha.json && grep -q '"current_mahadasha"' dasha.json && dasha="OK"

          curl -s "https://live-transit-engine.vercel.app/api/oracle?lat=51.1465&lon=0.8756" > oracle.json
          grep -q '"evidence_packet"' oracle.json && oracle="OK"

          ok_count=0
          fail_count=0

          for s in "$transit" "$kp" "$dasha" "$oracle"; do
            if [ "$s" = "OK" ]; then
              ok_count=$((ok_count+1))
            else
              fail_count=$((fail_count+1))
            fi
          done

          overall="HEALTHY"
          [ "$fail_count" -ge 1 ] && overall="ATTENTION NEEDED"
          [ "$fail_count" -ge 3 ] && overall="CRITICAL"

          report="📊 Daily Smart Report%0A%0A"
          report="${report}Transit: ${transit}%0A"
          report="${report}KP: ${kp}%0A"
          report="${report}Dasha: ${dasha}%0A"
          report="${report}Oracle: ${oracle}%0A%0A"
          report="${report}OK: ${ok_count}%0A"
          report="${report}Fail: ${fail_count}%0A"
          report="${report}Status: ${overall}"

          echo "REPORT=${report}" >> $GITHUB_ENV

      - name: Send WhatsApp Daily Report
        run: |
          curl -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Messages.json" \
          --data-urlencode "To=${{ secrets.TO_WHATSAPP }}" \
          --data-urlencode "From=whatsapp:+14155238886" \
          --data-urlencode "Body=${REPORT}" \
          -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}
