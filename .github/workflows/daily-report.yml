name: Daily WhatsApp Reminder

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"

jobs:
  daily-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure 7 AM UK time
        run: |
          UK_HOUR=$(TZ=Europe/London date +%H)
          if [ "$UK_HOUR" != "07" ]; then
            echo "Not 7 AM UK time. Exiting."
            exit 0
          fi

      - name: Check core APIs
        run: |
          transit="FAIL"
          dasha="FAIL"
          oracle="FAIL"

          curl -s "https://live-transit-engine.vercel.app/api/transit?lat=51.1465&lon=0.8756" > transit.json
          if grep -q '"sun"' transit.json && grep -q '"moon"' transit.json; then
            transit="OK"
          fi

          curl -s "https://live-transit-engine.vercel.app/api/dasha?moon_longitude=335.46" > dasha.json
          if grep -q '"nakshatra"' dasha.json && grep -q '"current_mahadasha"' dasha.json; then
            dasha="OK"
          fi

          curl -s "https://live-transit-engine.vercel.app/api/oracle?lat=51.1465&lon=0.8756" > oracle.json
          if grep -q '"evidence_packet"' oracle.json; then
            oracle="OK"
          fi

          status="OK"
          if [ "$transit" != "OK" ] || [ "$dasha" != "OK" ] || [ "$oracle" != "OK" ]; then
            status="ATTENTION"
          fi

          echo "STATUS=$status" >> "$GITHUB_ENV"
          echo "TRANSIT=$transit" >> "$GITHUB_ENV"
          echo "DASHA=$dasha" >> "$GITHUB_ENV"
          echo "ORACLE=$oracle" >> "$GITHUB_ENV"

      - name: Build Message
        run: |
          UK_TIME=$(TZ=Europe/London date '+%d/%m/%Y %H:%M')
          BD_TIME=$(TZ=Asia/Dhaka date '+%d/%m/%Y %H:%M')

          if [ "$STATUS" = "OK" ]; then
            BODY=$'রয়েল, নিয়তির দরজা আজ ভোরে খুলে বলল—\n\n⏰ UK সময়: '"$UK_TIME"$'\n⏰ BD সময়: '"$BD_TIME"$'\n\nযন্ত্রের প্রদীপ জ্বলে আছে।\nTransit: OK\nDasha: OK\nOracle: OK\n\nলোককথা বলে—\nপথ আজ খোলা,\nহিসাব আজ মেলে,\nকাজ সামনে এগোয়।'
          else
            BODY=$'রয়েল, নিয়তির দরজা আজ সাবধান করে বলল—\n\n⏰ UK সময়: '"$UK_TIME"$'\n⏰ BD সময়: '"$BD_TIME"$'\n\nStatus: '"$STATUS"$'\nTransit: '"$TRANSIT"$'\nDasha: '"$DASHA"$'\nOracle: '"$ORACLE"$'\n\nআজ চোখ খোলা রেখে চল।'
          fi

          echo "BODY<<EOF" >> $GITHUB_ENV
          echo "$BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send WhatsApp
        run: |
          curl -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Messages.json" \
            --data-urlencode "To=${{ secrets.TO_WHATSAPP }}" \
            --data-urlencode "From=whatsapp:+14155238886" \
            --data-urlencode "Body=$BODY" \
            -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}"
